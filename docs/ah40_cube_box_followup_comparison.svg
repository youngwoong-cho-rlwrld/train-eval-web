<svg xmlns="http://www.w3.org/2000/svg" width="980" height="540" viewBox="0 0 980 540" role="img" aria-labelledby="title desc">
  <title id="title">Cube Box AH40 follow-up comparison</title>
  <desc id="desc">Comparison of Cube_Box-5cmLeft success rates for N1.6 baseline, PhysiXel AH40 baseline, N1.6 retrain, PhysiXel AH40 retrain, and N1.6 checkpoint evaluated through the PhysiXel AH40 path. Bars show 0cm, 1cm, and 3cm eval sets with standard deviation. Black dots show the average of the three eval sets.</desc>
  <style>
    .bg { fill: #ffffff; }
    .axis { stroke: #334155; stroke-width: 1.2; }
    .grid { stroke: #e2e8f0; stroke-width: 1; }
    .tick { fill: #64748b; font: 12px system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
    .label { fill: #334155; font: 12px system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
    .title { fill: #0f172a; font: 700 18px system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
    .subtitle { fill: #475569; font: 13px system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
    .legend { fill: #334155; font: 12px system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
    .bar0 { fill: #60a5fa; }
    .bar1 { fill: #2563eb; }
    .bar3 { fill: #1e3a8a; }
    .avg { fill: #111827; stroke: #111827; stroke-width: 1.5; }
    .err { stroke: #1f2937; stroke-width: 1.2; }
  </style>
  <rect class="bg" width="980" height="540"/>

  <text class="title" x="80" y="30">Cube_Box-5cmLeft AH40 follow-up comparison</text>
  <text class="subtitle" x="80" y="52">Bars: mean success rate for 0cm, 1cm, 3cm. Whiskers: +/- 1 std across 3 runs. Black dot: average of 0cm/1cm/3cm.</text>

  <line class="grid" x1="80" y1="400" x2="900" y2="400"/>
  <line class="grid" x1="80" y1="317.5" x2="900" y2="317.5"/>
  <line class="grid" x1="80" y1="235" x2="900" y2="235"/>
  <line class="grid" x1="80" y1="152.5" x2="900" y2="152.5"/>
  <line class="grid" x1="80" y1="70" x2="900" y2="70"/>

  <line class="axis" x1="80" y1="70" x2="80" y2="400"/>
  <line class="axis" x1="80" y1="400" x2="900" y2="400"/>

  <text class="tick" x="57" y="404">0</text>
  <text class="tick" x="50" y="321.5">20</text>
  <text class="tick" x="50" y="239">40</text>
  <text class="tick" x="50" y="156.5">60</text>
  <text class="tick" x="50" y="74">80</text>
  <text class="label" x="18" y="210" transform="rotate(-90 18 210)">Success rate (%)</text>

  <rect class="bar0" x="752" y="22" width="12" height="12"/><text class="legend" x="770" y="32">0cm</text>
  <rect class="bar1" x="812" y="22" width="12" height="12"/><text class="legend" x="830" y="32">1cm</text>
  <rect class="bar3" x="872" y="22" width="12" height="12"/><text class="legend" x="890" y="32">3cm</text>
  <circle class="avg" cx="936" cy="28" r="4"/><text class="legend" x="946" y="32">Ave</text>

  <!-- N1.6 baseline -->
  <rect class="bar0" x="126" y="99.2" width="16" height="300.8"/>
  <line class="err" x1="134" y1="86.5" x2="134" y2="111.9"/><line class="err" x1="129" y1="86.5" x2="139" y2="86.5"/><line class="err" x1="129" y1="111.9" x2="139" y2="111.9"/>
  <rect class="bar1" x="150" y="107.3" width="16" height="292.7"/>
  <line class="err" x1="158" y1="89.1" x2="158" y2="125.6"/><line class="err" x1="153" y1="89.1" x2="163" y2="89.1"/><line class="err" x1="153" y1="125.6" x2="163" y2="125.6"/>
  <rect class="bar3" x="174" y="166.2" width="16" height="233.8"/>
  <line class="err" x1="182" y1="149.3" x2="182" y2="183.1"/><line class="err" x1="177" y1="149.3" x2="187" y2="149.3"/><line class="err" x1="177" y1="183.1" x2="187" y2="183.1"/>
  <circle class="avg" cx="158" cy="124.8" r="4"/>
  <text class="label" text-anchor="middle" x="158" y="423">N1.6</text>
  <text class="label" text-anchor="middle" x="158" y="439">baseline</text>
  <text class="tick" text-anchor="middle" x="158" y="462">Ave 66.83</text>

  <!-- PhysiXel AH40 baseline -->
  <rect class="bar0" x="286" y="144.7" width="16" height="255.3"/>
  <line class="err" x1="294" y1="134.6" x2="294" y2="154.7"/><line class="err" x1="289" y1="134.6" x2="299" y2="134.6"/><line class="err" x1="289" y1="154.7" x2="299" y2="154.7"/>
  <rect class="bar1" x="310" y="136.8" width="16" height="263.2"/>
  <line class="err" x1="318" y1="119.9" x2="318" y2="153.7"/><line class="err" x1="313" y1="119.9" x2="323" y2="119.9"/><line class="err" x1="313" y1="153.7" x2="323" y2="153.7"/>
  <rect class="bar3" x="334" y="201.6" width="16" height="198.4"/>
  <line class="err" x1="342" y1="189.5" x2="342" y2="213.7"/><line class="err" x1="337" y1="189.5" x2="347" y2="189.5"/><line class="err" x1="337" y1="213.7" x2="347" y2="213.7"/>
  <circle class="avg" cx="318" cy="160.5" r="4"/>
  <text class="label" text-anchor="middle" x="318" y="423">PhysiXel</text>
  <text class="label" text-anchor="middle" x="318" y="439">AH40 baseline</text>
  <text class="tick" text-anchor="middle" x="318" y="462">Ave 57.94</text>

  <!-- N1.6 retrain -->
  <rect class="bar0" x="446" y="93.6" width="16" height="306.4"/>
  <line class="err" x1="454" y1="83.9" x2="454" y2="103.2"/><line class="err" x1="449" y1="83.9" x2="459" y2="83.9"/><line class="err" x1="449" y1="103.2" x2="459" y2="103.2"/>
  <rect class="bar1" x="470" y="117.1" width="16" height="282.9"/>
  <line class="err" x1="478" y1="104.4" x2="478" y2="129.9"/><line class="err" x1="473" y1="104.4" x2="483" y2="104.4"/><line class="err" x1="473" y1="129.9" x2="483" y2="129.9"/>
  <rect class="bar3" x="494" y="178.5" width="16" height="221.5"/>
  <line class="err" x1="502" y1="168.5" x2="502" y2="188.6"/><line class="err" x1="497" y1="168.5" x2="507" y2="168.5"/><line class="err" x1="497" y1="188.6" x2="507" y2="188.6"/>
  <circle class="avg" cx="478" cy="129.6" r="4"/>
  <text class="label" text-anchor="middle" x="478" y="423">N1.6</text>
  <text class="label" text-anchor="middle" x="478" y="439">retrain</text>
  <text class="tick" text-anchor="middle" x="478" y="462">Ave 65.56</text>

  <!-- PhysiXel AH40 retrain -->
  <rect class="bar0" x="606" y="138.8" width="16" height="261.2"/>
  <line class="err" x1="614" y1="136.0" x2="614" y2="141.5"/><line class="err" x1="609" y1="136.0" x2="619" y2="136.0"/><line class="err" x1="609" y1="141.5" x2="619" y2="141.5"/>
  <rect class="bar1" x="630" y="142.7" width="16" height="257.3"/>
  <line class="err" x1="638" y1="137.1" x2="638" y2="148.3"/><line class="err" x1="633" y1="137.1" x2="643" y2="137.1"/><line class="err" x1="633" y1="148.3" x2="643" y2="148.3"/>
  <rect class="bar3" x="654" y="191.8" width="16" height="208.2"/>
  <line class="err" x1="662" y1="176.3" x2="662" y2="207.2"/><line class="err" x1="657" y1="176.3" x2="667" y2="176.3"/><line class="err" x1="657" y1="207.2" x2="667" y2="207.2"/>
  <circle class="avg" cx="638" cy="157.7" r="4"/>
  <text class="label" text-anchor="middle" x="638" y="423">PhysiXel</text>
  <text class="label" text-anchor="middle" x="638" y="439">AH40 retrain</text>
  <text class="tick" text-anchor="middle" x="638" y="462">Ave 58.73</text>

  <!-- N1.6 checkpoint through PhysiXel eval -->
  <rect class="bar0" x="766" y="101.4" width="16" height="298.6"/>
  <line class="err" x1="774" y1="83.2" x2="774" y2="119.7"/><line class="err" x1="769" y1="83.2" x2="779" y2="83.2"/><line class="err" x1="769" y1="119.7" x2="779" y2="119.7"/>
  <rect class="bar1" x="790" y="130.9" width="16" height="269.1"/>
  <line class="err" x1="798" y1="123.5" x2="798" y2="138.2"/><line class="err" x1="793" y1="123.5" x2="803" y2="123.5"/><line class="err" x1="793" y1="138.2" x2="803" y2="138.2"/>
  <rect class="bar3" x="814" y="158.9" width="16" height="241.1"/>
  <line class="err" x1="822" y1="141.5" x2="822" y2="176.3"/><line class="err" x1="817" y1="141.5" x2="827" y2="141.5"/><line class="err" x1="817" y1="176.3" x2="827" y2="176.3"/>
  <circle class="avg" cx="798" cy="130.2" r="4"/>
  <text class="label" text-anchor="middle" x="798" y="423">N1.6 ckpt</text>
  <text class="label" text-anchor="middle" x="798" y="439">PhysiXel eval</text>
  <text class="tick" text-anchor="middle" x="798" y="462">Ave 65.40</text>
</svg>
